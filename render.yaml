services:
  - type: web
    name: reviewlens
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_AI_PROVIDER
        value: groq
      - key: DEMO_GROQ_API_KEY
        sync: false
